<!-- @dsCard group="Type" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Nook — Type</title>
<style>
  :root { --background:#fff8e7; --foreground:#000; --accent:#16f5a3; }
  * { box-sizing:border-box; }
  body {
    margin:0; padding:48px;
    font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
    background:var(--background); color:var(--foreground);
    background-image:radial-gradient(70% 55% at 50% -5%, rgba(22,245,163,.12), transparent 65%);
    background-repeat:no-repeat;
  }
  .dot { color:var(--accent); }
  .stack { display:flex; flex-direction:column; gap:22px; max-width:640px; }
  .row { border-bottom:1px solid rgba(0,0,0,.08); padding-bottom:18px; }
  .label { font-size:11px; text-transform:uppercase; letter-spacing:.15em; color:rgba(0,0,0,.35); margin:0 0 8px; font-family:ui-monospace,monospace; }
  .wordmark { font-size:64px; font-weight:800; letter-spacing:-.03em; }
  .h1 { font-size:40px; font-weight:800; letter-spacing:-.02em; }
  .eyebrow { font-size:12px; text-transform:uppercase; letter-spacing:.2em; color:rgba(0,0,0,.4); font-weight:600; }
  .body { font-size:18px; color:rgba(0,0,0,.6); }
  .small { font-size:14px; color:rgba(0,0,0,.5); }
</style>
</head>
<body>
  <div class="stack">
    <div class="row"><p class="label">Wordmark</p><div class="wordmark">Nook<span class="dot">.</span></div></div>
    <div class="row"><p class="label">Heading · 800</p><div class="h1">Study rooms<span class="dot">.</span></div></div>
    <div class="row"><p class="label">Eyebrow · uppercase</p><div class="eyebrow">A calmer way to study</div></div>
    <div class="row"><p class="label">Body · 60% black</p><div class="body">The go-to study platform to keep you focused and engaged.</div></div>
    <div><p class="label">Small · 50% black</p><div class="small">Drop in anytime and stay as long as you like.</div></div>
  </div>
</body>
</html>
