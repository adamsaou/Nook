<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Nook — Buttons</title>
<style>
  :root { --background:#fff8e7; --foreground:#000; --accent:#16f5a3; --surface:#fff; }
  * { box-sizing:border-box; }
  body {
    margin:0; padding:48px;
    font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
    background:var(--background); color:var(--foreground);
    background-image:radial-gradient(70% 55% at 50% -5%, rgba(22,245,163,.12), transparent 65%);
    background-repeat:no-repeat;
  }
  .eyebrow { font-size:12px; text-transform:uppercase; letter-spacing:.2em; color:rgba(0,0,0,.4); margin:0 0 6px; }
  h1 { font-size:24px; font-weight:800; letter-spacing:-.02em; margin:0 0 28px; }
  .dot { color:var(--accent); }
  .group { margin-bottom:28px; }
  .glabel { font-size:11px; text-transform:uppercase; letter-spacing:.15em; color:rgba(0,0,0,.35); margin:0 0 12px; font-family:ui-monospace,monospace; }
  .row { display:flex; gap:14px; align-items:center; flex-wrap:wrap; }
  .btn { border:none; cursor:pointer; border-radius:9999px; padding:12px 24px; font-size:14px; font-weight:600; transition:.15s; font-family:inherit; }
  .primary { background:var(--accent); color:#000; }
  .secondary { background:#000; color:var(--background); }
  .outlined { background:#fff; color:#000; border:1px solid rgba(0,0,0,.2); }
  .sm { padding:7px 16px; font-size:12px; }
  .disabled { opacity:.5; cursor:not-allowed; }
</style>
</head>
<body>
  <p class="eyebrow">Components</p>
  <h1>Buttons<span class="dot">.</span></h1>

  <div class="group">
    <p class="glabel">Variants</p>
    <div class="row">
      <button class="btn primary">Start focusing</button>
      <button class="btn secondary">Join a random room</button>
      <button class="btn outlined">Study rooms</button>
    </div>
  </div>

  <div class="group">
    <p class="glabel">Small (used in lists / controls)</p>
    <div class="row">
      <button class="btn primary sm">Join</button>
      <button class="btn outlined sm">Enter</button>
      <button class="btn secondary sm">🎙️ Mute</button>
    </div>
  </div>

  <div class="group">
    <p class="glabel">Disabled</p>
    <div class="row">
      <button class="btn primary disabled">Voice full</button>
      <button class="btn primary sm disabled">Joining…</button>
    </div>
  </div>
</body>
</html>
